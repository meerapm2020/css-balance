<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
           width: 330px;
           height:330px;
           border:2px solid black;
           background-image:url("cofe1.jpeg");    
           background-size: 50px 50px;
        }
        .box1{
            background-repeat: repeat;
        }
          .box2{
            background-repeat: repeat-x;
        }
          .box3{
            background-repeat: repeat-y;
        }
          .box4{
            background-repeat: no-repeat;
        }
          .box5{
            background-repeat: space;
        }
          .box6{
            background-repeat: round;
        }
    </style>
</head>
<body>
    <div class="box1">Repeat</div>
    <br>
    <div class="box2">Repeat-x</div>
    <br>
    <div class="box3">Repeat-y</div>
    <br>
    <div class="box4">No-repeat</div>
    <br>
    <div class="box5">space</div>
    <br>
    <div class="box6">round</div>
    
</body>
</html>
