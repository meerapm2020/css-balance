<!DOCTYPE html>
<html>
<head>
<style>
div{
    width:300px;
    height:200px;
    border:2px solid black;
    margin:20px;
    background-image:url("cofe1.jpeg");
    background-repeat:no-repeat;
}
/* 1. auto (original image size) */
.box1{
    background-size:auto;
}
/* 2. length (custom size) */
.box2{
    background-size:100px 100px;
}
/* 3. cover (fills entire box, may crop) */
.box3{
    background-size:cover;
    background-position:center;
}
/* 4. contain (whole image visible, gaps possible) */
.box4{
    background-size:contain;
    background-position:center;
}
/* 5. initial (same as auto) */
.box5{
    background-size:initial;
}
/* 6. inherit */
.parent{
    background-size:cover;
}
.box6{
    background-size:inher
    it;
    background-position:center;
}
</style>
</head>
<body>

<h3>Auto</h3>
<div class="box1"></div>

<h3>Length</h3>
<div class="box2"></div>

<h3>Cover</h3>
<div class="box3"></div>

<h3>Contain</h3>
<div class="box4"></div>

<h3>Initial</h3>
<div class="box5"></div>

<h3>Inherit</h3>
<div class="parent">
    <div class="box6"></div>
</div>

</body>
</html>
