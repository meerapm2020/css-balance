<!DOCTYPE html>
<html>
<head>
<style>
.container{
    perspective: 500px;
}
.box{
    width:200px;
    height:200px;
    background: skyblue;
    margin:100px;
    transition:1s;
}
.box:hover{
    transform:
    translateZ(100px)
    rotateX(45deg)
    rotateY(45deg)
    scale3d(1.3,1.3,1.3)
}

</style>
</head>
<body>

<div class="container">
    <div class="box"></div>
</div>

</body>
</html>
