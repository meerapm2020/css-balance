<!DOCTYPE html>
<html>
<head>
<style>
.container{
    display:flex;
    /* flex-direction:row; */
    justify-content:space-around;
    align-items:center;
    align-content: center;
    /* flex-wrap:wrap;   */
    flex-flow:row wrap;
    gap:20px;
    width:800px;
    height:400px;
    border:2px solid black;
    order: 5;
}

.box{
    width:100px;
    height:100px;
    background:orange;
    text-align:center; 
    line-height:100px;
    font-size:30px;
}
</style>
</head>
<body>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
</div>

</body>
</html>
