<!DOCTYPE html>
<html>
<head>
<style>
.box{
    width:150px;
    height:150px;
    background:orange;
    margin:100px;
    transition:1s;
}

.box:hover{
    transform:
        translate(100px,50px)
        rotate(45deg)
        scale(1.3)
        skew(10deg,5deg);
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
