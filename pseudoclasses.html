<!DOCTYPE html>
<html>
<head>
<style>
button:hover{
   background-color: red;
}
button:active{
   background-color: green;
}
input:focus{
   border:2px solid red;
}
a:visited{
   color:purple;
}
input[type="checkbox"]:checked{
   width:25px;
   height:25px;
}

li:first-child{
   color:red;
}

li:nth-child(3){
   color: blue;
}

</style>
</head>
<body>

<button>Hover / Click</button>
<br><br>

<input type="text" placeholder="Click me">
<br><br>

<a href="#">Sample Link</a>
<br><br>

<input type="checkbox"> Check me

<ul>
   <li>Apple</li>
   <li>Mango</li>
   <li>Orange</li>
</ul>

</body>
</html>
