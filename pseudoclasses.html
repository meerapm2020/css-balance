<!DOCTYPE html>
<html>
<head>
<style>
button:hover{
   background:red;
}

button:active{
   background:green;
}

input:focus{
   border:2px solid blue;
}

a:link{
   color:blue;
}

a:visited{
   color:purple;
}

input[type="checkbox"]:checked{
   width:25px;
   height:25px;
}

li:first-child{
   color:red;
}

li:nth-child(2){
   color:green;
}
</style>
</head>
<body>

<button>Hover / Click</button>
<br><br>

<input type="text" placeholder="Click me">
<br><br>

<a href="#">Sample Link</a>
<br><br>

<input type="checkbox"> Check me

<ul>
   <li>Apple</li>
   <li>Mango</li>
   <li>Orange</li>
</ul>

</body>
</html>
