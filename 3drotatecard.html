<!DOCTYPE html>
<html>
<head>
<style>
.container{
    perspective:500px;
}

.box{
    width:200px;
    height:200px;
    background:orange;
    margin:100px;
    transition:1s;
}

.box:hover{
    transform: rotateY(180deg);
}
</style>
</head>
<body>

<div class="container">
    <div class="box"></div>
</div>

</body>
</html>
