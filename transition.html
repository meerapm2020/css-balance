<!DOCTYPE html>
<html>
<head>
<style>
.box{
    width:150px;
    height:150px;
    background:red;

    /* Transition properties */
    transition-property: all;
    transition-duration: 2s;
    transition-timing-function: ease-in-out;
    transition-delay: 1s;
}

.box:hover{
    background:blue;
    width:300px;
    border-radius:50%;
}
</style>
</head>
<body>

<div class="box"></div>

</body>
</html>
